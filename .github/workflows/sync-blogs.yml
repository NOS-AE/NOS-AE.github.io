name: Sync Blogs

on:
  push:
    branches:
      - main
      - master
    paths:
      - '_posts/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create config file
      run: |
        # 使用GitHub Secrets中的配置信息
        sed -i "s|cnblogs-username|${{ secrets.CNBLOGS_USERNAME }}|g" _config.yaml
        sed -i "s|cnblogs-token|${{ secrets.CNBLOGS_TOKEN }}|g" _config.yaml
        sed -i "s|false|true|g" _config.yaml
        
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v39
      with:
        files: |
          _posts/**
          
    - name: Sync changed files
      run: |
        for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
          if [[ $file == *.md ]]; then
            echo "Syncing $file..."
            python main.py "$file"
          fi
        done 